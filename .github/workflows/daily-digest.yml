# ─────────────────────────────────────────────────────────────────────────────
# daily-digest.yml
# Runs the subscriber digest script once a day at 7:30 AM IST (2:00 AM UTC).
# Only sends an email if there were new newsletter subscribers in the last 24h.
# Can also be triggered manually from the Actions tab (workflow_dispatch).
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Subscriber Digest

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC = 7:30 AM IST, every day
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _tools/subscriber-digest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: _tools/subscriber-digest/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run daily digest
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER:               ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node daily-digest.js
